<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Medicure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    .section {
      padding: 60px 0;
    }

    .card-box {
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      padding: 30px;
    }

    .icon {
      font-size: 22px;
      color: #0d6efd;
      margin-right: 10px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand text-primary fw-bold" href="home.html">Medicure</a>
  </div>
</nav>

<!-- Contact Section -->
<div class="container section">
  <div class="row g-4">

    <!-- Contact Form -->
    <div class="col-md-7">
      <div class="card-box">
        <h3 class="text-primary mb-3">Get in Touch</h3>
        <p class="text-muted">We’d love to hear from you.</p>

        <form onsubmit="handleSubmit(event)">
          <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" required></textarea>
          </div>

          <button class="btn btn-primary w-100">Send Message</button>
        </form>

        <!-- Success message -->
        <div id="successMsg" class="alert alert-success mt-3 d-none">
          Message sent successfully!
        </div>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="col-md-5">
      <div class="card-box">
        <h4 class="text-primary mb-4">Contact Info</h4>

        <p><i class="bi bi-envelope icon"></i> support@medicure.com</p>
        <p><i class="bi bi-telephone icon"></i> +91 98765 43210</p>
        <p><i class="bi bi-geo-alt icon"></i> Mumbai, India</p>

        <hr>

        <h5 class="mt-3">Working Hours</h5>
        <p class="text-muted">Mon - Sun: 24/7 Support</p>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-primary text-white text-center py-3">
  <p class="mb-0">&copy; 2025 Medicure. All rights reserved.</p>
</footer>

<script src="./bootstrap/dist/js/bootstrap.bundle.min.js"></script>

<script>
function handleSubmit(e) {
  e.preventDefault();
  document.getElementById("successMsg").classList.remove("d-none");
}
</script>

</body>
</html>
