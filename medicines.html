<!DOCTYPE html>
<html lang="en" ng-app="medicureApp">
<head>
  <meta charset="UTF-8">
  <title>Medicines - Medicure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      height: 180px;
      object-fit: cover;
      border-radius: 15px 15px 0 0;
    }

    .search-box {
      max-width: 400px;
      margin: auto;
    }

    .cart-badge {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 3px 8px;
      font-size: 12px;
      margin-left: 5px;
    }
  </style>
</head>

<body ng-controller="medicineCtrl">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand text-primary fw-bold">Medicure</a>

    <a href="cart.html" class="text-decoration-none text-dark">
  🛒 Cart <span class="cart-badge">{{cart.length}}</span>
</a>
  </div>
</nav>

<!-- Search -->
<div class="container my-4 text-center">
  <input type="text" class="form-control search-box"
         placeholder="Search medicines..."
         ng-model="searchText">
</div>

<!-- Medicines -->
<div class="container">
  <div class="row">
    
    <div class="col-md-4 mb-4" ng-repeat="med in medicines | filter:searchText">
      
      <div class="card">
        <img ng-src="{{med.image}}" alt="{{med.name}}">
        
        <div class="card-body text-center">
          <h5>{{med.name}}</h5>
          <p class="text-muted">{{med.description}}</p>
          <h6 class="text-primary">₹ {{med.price}}</h6>

          <button class="btn btn-primary mt-2"
                  ng-click="addToCart(med)">
            <i class="bi bi-cart-plus"></i> Add to Cart
          </button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- Angular -->
<script src="./angular-1.8.2/angular.min.js"></script>

<script>
  var app = angular.module("medicureApp", []);

  app.controller("medicineCtrl", function($scope, $http) {

    $scope.cart = JSON.parse(localStorage.getItem("cart")) || [];

    // Load medicines
    $http.get("medicinedetail.json").then(function(response) {
      $scope.medicines = response.data;
    });

    // Add to cart
    $scope.addToCart = function(med) {

  let existing = $scope.cart.find(item => item.id === med.id);

  if (existing) {
    existing.qty += 1;
  } else {
    let newItem = {...med, qty: 1};
    $scope.cart.push(newItem);
  }

  localStorage.setItem("cart", JSON.stringify($scope.cart));
};

  });
</script>

</body>
</html>
