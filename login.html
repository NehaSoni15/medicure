<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Medicure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="./bootstrap/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 15px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
    }

    .input-group-text {
      background: #fff;
    }
  </style>
</head>
<body>

<div class="login-card">

  <h3 class="text-center text-primary mb-3">Welcome Back</h3>

  <form onsubmit="login(event)">

    <!-- Username -->
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" id="loginUsername" class="form-control" placeholder="Username" required>
    </div>

    <!-- Password -->
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
      <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
        <i class="bi bi-eye" id="eyeIcon"></i>
      </span>
    </div>

    <button class="btn btn-success w-100">Login</button>

    <p class="text-center mt-3">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </form>

  <!-- Messages -->
  <div id="successMsg" class="alert alert-success mt-3 d-none">
    Login successful! Redirecting...
  </div>

  <div id="errorMsg" class="alert alert-danger mt-3 d-none">
    Invalid username or password
  </div>

</div>

<script src="./bootstrap/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword() {
  const pass = document.getElementById("loginPassword");
  const icon = document.getElementById("eyeIcon");

  if (pass.type === "password") {
    pass.type = "text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
  } else {
    pass.type = "password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
  }
}

function login(event) {
  event.preventDefault();

  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  const user = JSON.parse(localStorage.getItem("user"));

  document.getElementById("errorMsg").classList.add("d-none");

  if (user && user.username === username && user.password === password) {

    document.getElementById("successMsg").classList.remove("d-none");

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1500);

  } else {
    document.getElementById("errorMsg").classList.remove("d-none");
  }
}
</script>

</body>
</html>
